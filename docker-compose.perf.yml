services:
  minio:
    environment:
      MINIO_ROOT_USER: perfminio
      MINIO_ROOT_PASSWORD: perfminiosecret

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-4}
    environment:
      APP_ENV: production
      ENABLE_DEV_AUTH: "false"
      AUTH_SECRET_KEY: perf-benchmark-secret-change-me
      CORS_ORIGINS: http://localhost:5173
      API_RATE_LIMIT_ENABLED: "false"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      MINIO_ROOT_USER: perfminio
      MINIO_ROOT_PASSWORD: perfminiosecret
      DASHBOARD_SUMMARY_CACHE_TTL_SECONDS: ${DASHBOARD_SUMMARY_CACHE_TTL_SECONDS:-20}
      MAP_OBSERVATIONS_CACHE_TTL_SECONDS: ${MAP_OBSERVATIONS_CACHE_TTL_SECONDS:-10}
      GAMIFICATION_STATS_CACHE_TTL_SECONDS: ${GAMIFICATION_STATS_CACHE_TTL_SECONDS:-30}
      SPECIES_LIST_CACHE_TTL_SECONDS: ${SPECIES_LIST_CACHE_TTL_SECONDS:-120}
      VALIDATION_QUEUE_CACHE_TTL_SECONDS: ${VALIDATION_QUEUE_CACHE_TTL_SECONDS:-15}
      NOTIFICATION_UNREAD_CACHE_TTL_SECONDS: ${NOTIFICATION_UNREAD_CACHE_TTL_SECONDS:-10}
