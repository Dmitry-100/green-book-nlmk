name: CD Build Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional custom image tag (default: commit SHA)"
        required: false
        type: string
      publish:
        description: "Push images to GHCR"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve registry metadata
        id: meta
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LOWER="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "registry=ghcr.io" >> "$GITHUB_OUTPUT"
          echo "image_namespace=${OWNER_LOWER}/green-book-nlmk" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event.inputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_namespace }}/backend:${{ steps.tag.outputs.tag }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_namespace }}/backend:staging-latest

      - name: Build and optionally push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_namespace }}/frontend:${{ steps.tag.outputs.tag }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_namespace }}/frontend:staging-latest

      - name: Output image refs
        run: |
          echo "Backend image: ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_namespace }}/backend:${{ steps.tag.outputs.tag }}"
          echo "Frontend image: ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_namespace }}/frontend:${{ steps.tag.outputs.tag }}"
